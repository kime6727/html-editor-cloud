# Nginx 配置 - HTML Code Editor (Docker)
server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 55M;

    # 访问日志
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # =============================================
    # pub/ 目录：发布项目的网关和静态服务
    # =============================================
    location /pub/ {
        alias /var/www/html/pub/;
        autoindex off;
        include /etc/nginx/mime.types;

        # HTML/HTM 文件 → PHP 网关（过期检查、密码验证、访问统计）
        location ~ ^/pub/([a-z0-9]+)/([^.]+\.(html|htm))$ {
            rewrite ^/pub/([a-z0-9]+)/([^.]+\.(html|htm))$ /index.php?project_id=$1&file=$2 last;
        }

        # 项目根目录 → 默认 index.html → 网关
        location ~ ^/pub/([a-z0-9]+)/?$ {
            rewrite ^/pub/([a-z0-9]+)/?$ /index.php?project_id=$1&file=index.html last;
        }

        # 静态资源直接提供
        location ~* \.(css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|bmp|ico|ttf|otf|woff|woff2|eot|xml|yaml|yml|map)$ {
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 禁止访问 PHP 和备份文件
        location ~ \.php$ { deny all; }
        location ~ \.(bak|backup|old|tmp)$ { deny all; }
    }

    # =============================================
    # PHP 处理
    # =============================================
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        include fastcgi_params;
    }

    # =============================================
    # 安全设置
    # =============================================
    location ~ /\.           { deny all; }
    location /data/          { deny all; }
    location /database/      { deny all; }
    location = /favicon.ico  { log_not_found off; access_log off; }
    location = /robots.txt   { log_not_found off; access_log off; }
}