            --bg-end: #1a1a2e;
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* Subtle background animation */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, -3%); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 440px;
            width: 100%;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(99,102,241,0.35),
                        0 0 0 1px rgba(255,255,255,0.06);
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 40px 32px;
            text-align: center;
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 32px 32px 36px;
            text-align: center;
        }

        /* Brand Name */
        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-light);
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        /* Typography */
        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-border), transparent);
            margin: 28px 0;
        }

        /* App Promo Section */
        .promo {
            padding: 4px 0 0;
        }

        .promo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .promo-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .promo h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .promo p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Download Button */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 20px rgba(99,102,241,0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(99,102,241,0.4);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Features Grid */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .feature-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
            padding: 16px 10px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .feature-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .feature-item .icon {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .feature-item .text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        /* Official Website Button */
        .website-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 16px;
        }

        .website-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.03);
        }

        .website-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Language Switcher */
        .lang-switcher {
            position: relative;
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-xs);
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
        }

        .lang-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .lang-dropdown {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,50,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            padding: 8px;
            display: none;
            min-width: 180px;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .lang-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: var(--radius-xs);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .lang-option:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
        }

        .lang-option.active {
            background: rgba(99,102,241,0.15);
            color: var(--primary-light);
        }

        .lang-option .check {
            width: 16px;
            height: 16px;
            opacity: 0;
        }

        .lang-option.active .check {
            opacity: 1;
        }

        }

        /* RTL Support */

            left: auto;
            right: 50%;
            transform: translateX(50%);

        [dir="rtl"] .lang-dropdown.show {
            transform: translateX(50%) translateY(0);
        }

        @keyframes fadeInRTL {
            from { opacity: 0; transform: translateX(50%) translateY(8px); }
            to { opacity: 1; transform: translateX(50%) translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 20px 16px; }
            .card { padding: 32px 24px; }

            .features { gap: 8px; }
            .feature-item { padding: 14px 8px; }

    var supportedLangs = ["en","zh-Hans","zh-Hant","ja","ko","fr","de","es","pt","it","ru","ar","hi","tr","vi","th","id","nl","pl","ms"];
    var currentLang = "en";

    // Detect browser language
    function detectLanguage() {
        var browserLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
        // Try exact match first
        for (var i = 0; i < supportedLangs.length; i++) {
            if (supportedLangs[i].toLowerCase() === browserLang) return supportedLangs[i];
        }
        // Try prefix match (e.g., "zh" -> "zh-Hans")
        var prefix = browserLang.split("-")[0];
        for (var j = 0; j < supportedLangs.length; j++) {
            if (supportedLangs[j].split("-")[0] === prefix) return supportedLangs[j];
        }
        return "en"; // Default
    }

    // Apply language
    function applyLanguage(lang) {
        if (!translations[lang]) lang = "en";
        currentLang = lang;
        var t = translations[lang];

        document.getElementById("title").textContent = t.title;
        document.getElementById("subtitle").textContent = t.subtitle;
        document.getElementById("promoTitle").textContent = t.promoTitle;
        document.getElementById("promoDesc").textContent = t.promoDesc;
        document.getElementById("downloadBtn").textContent = t.downloadBtn;
        document.getElementById("websiteBtn").textContent = t.websiteBtn;
        document.getElementById("feature1").textContent = t.feature1;
        document.getElementById("feature2").textContent = t.feature2;
        document.getElementById("feature3").textContent = t.feature3;
        document.getElementById("footer").textContent = t.footer;
        document.getElementById("pageTitle").textContent = t.title + " - Code Editor";
        document.getElementById("currentLangName").textContent = t.name;

        // RTL support for Arabic
        if (lang === "ar") {
            document.documentElement.dir = "rtl";
        } else {
            document.documentElement.dir = "ltr";
        }

        // Save preference
        try { localStorage.setItem("expired_page_lang", lang); } catch(e) {}

        // Update active state in dropdown
        updateDropdownActive();
    }

    // Build dropdown
    function buildDropdown() {
        var dropdown = document.getElementById("langDropdown");
        dropdown.innerHTML = "";
        for (var i = 0; i < supportedLangs.length; i++) {
            var lang = supportedLangs[i];
            var t = translations[lang];
            if (!t) continue;
            var btn = document.createElement("button");
            btn.className = "lang-option";
            btn.setAttribute("data-lang", lang);
            btn.innerHTML = '<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>' + t.name;
            btn.onclick = (function(l) {
                return function() {
                    applyLanguage(l);
                    closeLangDropdown();
                };
            })(lang);
            dropdown.appendChild(btn);
        }
        updateDropdownActive();
    }

    function updateDropdownActive() {
        var options = document.querySelectorAll(".lang-option");
        for (var i = 0; i < options.length; i++) {
            if (options[i].getAttribute("data-lang") === currentLang) {
                options[i].classList.add("active");
            } else {
                options[i].classList.remove("active");
            }
        }
    }

    function toggleLangDropdown() {
        var dropdown = document.getElementById("langDropdown");
        if (dropdown.classList.contains("show")) {
            closeLangDropdown();
        } else {
            dropdown.classList.add("show");
        }
    }

    function closeLangDropdown() {
        document.getElementById("langDropdown").classList.remove("show");
    }

    // Close dropdown when clicking outside
    document.addEventListener("click", function(e) {
        var switcher = document.querySelector(".lang-switcher");
        if (!switcher.contains(e.target)) {
            closeLangDropdown();
        }
    });

    // Initialize
    buildDropdown();

    // Load saved preference or detect
    var savedLang = null;
    try { savedLang = localStorage.getItem("expired_page_lang"); } catch(e) {}
    if (savedLang && translations[savedLang]) {
        applyLanguage(savedLang);
    } else {
        applyLanguage(detectLanguage());
    }
    </script>
