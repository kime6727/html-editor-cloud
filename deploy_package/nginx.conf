# Nginx 配置 - HTML Code Editor 后端
# 域名: https://html.weburl.cloudns.be
# 网站根目录: 请替换为实际路径，例如 /var/www/html 或 /home/user/deploy_package

# pub 目录：HTML请求路由到网关进行过期检查、密码验证和访问统计
# 静态资源（CSS/JS/图片/字体）直接提供服务
location /pub/ {
    # ⚠️ 重要：将下方路径替换为你的实际部署路径
    # 例如：/var/www/html/pub/ 或 /home/user/deploy_package/pub/
    alias /你的实际路径/deploy_package/pub/;
    
    # 禁止目录浏览
    autoindex off;
    
    # 设置 MIME 类型
    include /etc/nginx/mime.types;
    types {
        text/html html htm;
        text/css css;
        application/javascript js mjs;
        application/json json;
        image/svg+xml svg;
        image/png png;
        image/jpeg jpg jpeg;
        image/gif gif;
        image/webp webp;
        font/woff2 woff2;
        font/ttf ttf;
        font/otf otf;
    }
    
    # 规则1：HTML/HTM文件请求通过PHP网关检查过期、密码和访问统计
    location ~ ^/pub/([a-z0-9]+)/([^.]+\.(html|htm))$ {
        # 重写URL到index.php网关
        rewrite ^/pub/([a-z0-9]+)/([^.]+\.(html|htm))$ /index.php?project_id=$1&file=$2 last;
    }
    
    # 规则2：项目目录根路径默认访问index.html并通过网关
    location ~ ^/pub/([a-z0-9]+)/?$ {
        rewrite ^/pub/([a-z0-9]+)/?$ /index.php?project_id=$1&file=index.html last;
    }
    
    # 规则3：静态资源直接访问（CSS/JS/图片/字体等）
    # 这些文件无需网关检查，直接由Nginx提供
    location ~* \.(css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|bmp|ico|ttf|otf|woff|woff2|eot|xml|yaml|yml|map)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # HTML文件不缓存（通过网关动态提供）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    
    # 禁止访问PHP文件
    location ~ \.php$ {
        deny all;
    }
    
    # 禁止访问备份文件
    location ~ \.(bak|backup|old|tmp)$ {
        deny all;
    }
}

# index.php 网关处理：过期检查、密码验证、访问统计
location = /index.php {
    fastcgi_pass unix:/var/run/php/php-fpm.sock;  # 或 127.0.0.1:9000
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    
    # 安全头
    fastcgi_param HTTP_X_REAL_IP $remote_addr;
    fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    
    # 禁用缓冲以提高响应速度
    fastcgi_buffering off;
}

# PHP 处理（其他PHP文件）
location ~ \.php$ {
    fastcgi_pass unix:/var/run/php/php-fpm.sock;  # 或 127.0.0.1:9000
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    
    # 安全头
    fastcgi_param HTTP_X_REAL_IP $remote_addr;
    fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
}

# 安全设置：禁止访问隐藏文件
location ~ /\. {
    deny all;
}

# 安全设置：禁止访问data目录
location /data/ {
    deny all;
}

# 安全设置：禁止访问database目录
location /database/ {
    deny all;
}
