# ============================================================
# HTML Code Editor - Nginx Docker 配置
# 适用: nginx + php-fpm (Docker Compose 环境)
# ============================================================

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html index.htm index.php;

    charset utf-8;
    client_max_body_size 52m;

    # --------------------------------------------------
    # 错误日志
    # --------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --------------------------------------------------
    # 1. PHP 文件 → PHP-FPM
    # --------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # --------------------------------------------------
    # 2. 项目访问网关: pub/{id}/index.html → index.php
    # --------------------------------------------------
    location ~ ^/pub/([a-z0-9]+)/([^.]+\.(html|htm))$ {
        rewrite ^/pub/([a-z0-9]+)/([^.]+\.(html|htm))$ /index.php?project_id=$1&file=$2 last;
    }

    location ~ ^/pub/([a-z0-9]+)/?$ {
        rewrite ^/pub/([a-z0-9]+)/?$ /index.php?project_id=$1&file=index.html last;
    }

    # --------------------------------------------------
    # 3. 静态资源: pub/ 下的 CSS/JS/图片 直接返回
    # --------------------------------------------------
    location /pub/ {
        alias /var/www/html/pub/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        location ~* \.php$ {
            deny all;
        }
    }

    # --------------------------------------------------
    # 4. 首页 → landing page (web/index.html)
    # --------------------------------------------------
    location = / {
        root /var/www/landing;
        try_files /index.html =404;
    }

    # --------------------------------------------------
    # 5. landing page 静态资源
    # --------------------------------------------------
    location /pic/ {
        root /var/www/landing;
        expires 30d;
    }

    # --------------------------------------------------
    # 6. 安全: 禁止访问敏感文件
    # --------------------------------------------------
    location ~ /\.env {
        deny all;
        return 404;
    }

    location /database/ {
        deny all;
        return 404;
    }

    location /data/ {
        deny all;
        return 404;
    }

    location ~ \.(bak|sql|md|txt|sh)$ {
        deny all;
    }

    # --------------------------------------------------
    # 7. 健康检查
    # --------------------------------------------------
    location /ping {
        access_log off;
        return 200 'pong';
        add_header Content-Type text/plain;
    }
}
