# HTML Code Editor - Docker Compose
# Dokploy 部署配置

services:
  # =============================================
  # PHP + Nginx 应用服务
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: html_editor
      DB_USER: html_editor
      DB_PASS: ${DB_PASS:-StrongP@ssw0rd!2024}
      DB_CHARSET: utf8mb4
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123admin123}
      PUBLISH_API_KEY: ${PUBLISH_API_KEY:-zheshimiyao112233}
      HMAC_SECRET_KEY: ${HMAC_SECRET_KEY:-zheshimiyao112233}
      DEBUG: "false"
      CRON_SECRET_KEY: ${CRON_SECRET_KEY:-expire_cron_2024_secret}
    volumes:
      - pub_data:/var/www/html/pub
      - app_logs:/var/log/nginx
    networks:
      - default
    extra_hosts:
      - "db:172.30.0.10"
    depends_on:
      db:
        condition: service_started

  # =============================================
  # MySQL 8.4 数据库服务（固定IP，不暴露端口）
  # =============================================
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootP@ssw0rd!2024}
      MYSQL_DATABASE: html_editor
      MYSQL_USER: html_editor
      MYSQL_PASSWORD: ${DB_PASS:-StrongP@ssw0rd!2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy_package/database/init_mysql84.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      default:
        ipv4_address: 172.30.0.10
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=64M
      - --innodb_buffer_pool_size=128M
      - --innodb_log_file_size=64M
      - --default-authentication-plugin=mysql_native_password

# =============================================
# 持久化存储
# =============================================
volumes:
  pub_data:
    name: html-editor-pub-data
    driver: local
  app_logs:
    name: html-editor-app-logs
    driver: local
  mysql_data:
    name: html-editor-mysql-data
    driver: local

# =============================================
# 网络 — 固定 IP 段绕过 Alpine musl DNS 问题
# =============================================
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16